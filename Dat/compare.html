<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compare Roles — Job Market Dataset</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    /* ── Compare hero ── */
    .compare-hero {
      background:var(--ink); color:#fff; position:relative; overflow:hidden; padding:44px 0 40px;
    }
    .compare-hero::before {
      content:''; position:absolute; inset:0;
      background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);
      background-size:40px 40px;
    }
    .compare-hero-inner { max-width:1320px; margin:0 auto; padding:0 28px; position:relative; z-index:1; }
    .compare-hero h1 { font-family:var(--font-disp); font-size:26px; font-weight:500; margin-bottom:4px; }
    .compare-hero p { font-size:13px; color:rgba(255,255,255,.45); margin-bottom:24px; }

    /* selector row */
    .selector-row {
      display:flex; gap:14px; align-items:flex-end; flex-wrap:wrap;
    }
    .selector-group { display:flex; flex-direction:column; gap:6px; }
    .selector-group label { font-size:10px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:rgba(255,255,255,.4); }
    .role-select {
      background:rgba(255,255,255,.1); color:#fff;
      border:1px solid rgba(255,255,255,.2); border-radius:8px;
      padding:9px 14px; font-size:13px; font-family:var(--font-body);
      outline:none; cursor:pointer; min-width:200px;
      transition:background .2s;
    }
    .role-select:focus { background:rgba(255,255,255,.15); border-color:rgba(255,255,255,.35); }
    .role-select option { background:#1c1a17; color:#fff; }
    .compare-vs {
      font-family:var(--font-disp); font-size:18px; font-style:italic;
      color:rgba(255,255,255,.3); padding-bottom:10px;
    }
    .btn-compare {
      background:#fff; color:var(--ink); border:none; padding:10px 22px;
      border-radius:8px; font-size:13px; font-weight:600; cursor:pointer;
      font-family:var(--font-body); transition:opacity .15s; margin-bottom:1px;
    }
    .btn-compare:hover { opacity:.85; }

    /* ── Compare page ── */
    .compare-page { max-width:1320px; margin:0 auto; padding:28px 28px 64px; }

    .compare-placeholder {
      text-align:center; padding:80px 0; color:var(--ink3);
    }
    .compare-placeholder svg { margin-bottom:16px; color:var(--ink4); }
    .compare-placeholder p { font-size:14px; margin-bottom:4px; }
    .compare-placeholder small { font-size:12px; color:var(--ink4); }

    /* color accents per role */
    .role-a { --role-clr: #2563eb; }
    .role-b { --role-clr: #16a34a; }

    /* ── Side-by-side header ── */
    .compare-header {
      display:grid; grid-template-columns:160px 1fr 1fr; gap:0;
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--radius) var(--radius) 0 0;
      overflow:hidden; margin-bottom:0;
    }
    .compare-header .ch-label { padding:20px 22px; display:flex; align-items:center; border-right:1px solid var(--border); }
    .compare-header .ch-role {
      padding:20px 22px; border-right:1px solid var(--border);
      display:flex; flex-direction:column; justify-content:center;
    }
    .compare-header .ch-role:last-child { border-right:none; }
    .ch-role-name { font-family:var(--font-disp); font-size:17px; font-weight:500; margin-bottom:4px; }
    .ch-role-bar { height:3px; width:48px; border-radius:99px; margin-top:6px; }

    /* ── Compare rows ── */
    .compare-body {
      background:var(--surface); border:1px solid var(--border);
      border-top:none; border-radius:0 0 var(--radius) var(--radius);
      overflow:hidden; margin-bottom:20px;
    }
    .cmp-row {
      display:grid; grid-template-columns:160px 1fr 1fr;
      border-bottom:1px solid var(--border);
    }
    .cmp-row:last-child { border-bottom:none; }
    .cmp-row:hover { background:var(--surface2); }
    .cmp-label {
      padding:14px 22px; font-size:10px; font-weight:600; letter-spacing:1px;
      text-transform:uppercase; color:var(--ink3); display:flex; align-items:center;
      border-right:1px solid var(--border); background:var(--surface2);
    }
    .cmp-val {
      padding:14px 22px; font-size:14px; color:var(--ink);
      border-right:1px solid var(--border); display:flex; align-items:center; gap:8px;
    }
    .cmp-val:last-child { border-right:none; }
    .cmp-val.mono { font-family:var(--font-mono); font-size:15px; }
    .cmp-val.winner { background:#f0fdf4; }
    .cmp-val.loser  { background:#fafaf9; color:var(--ink2); }
    .winner-badge {
      font-size:9px; font-weight:700; letter-spacing:.8px; text-transform:uppercase;
      background:#16a34a; color:#fff; padding:2px 6px; border-radius:3px;
    }

    /* ── Skill comparison ── */
    .skill-compare-grid {
      display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:20px;
    }
    .skill-cmp-card {
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--radius); padding:20px 22px; box-shadow:var(--shadow);
    }
    .skill-cmp-title { font-size:12px; font-weight:600; margin-bottom:14px; color:var(--ink); }
    .skill-tag-wrap { display:flex; flex-wrap:wrap; gap:6px; }
    .skill-tag-yes {
      font-size:11px; font-family:var(--font-mono); font-weight:500;
      background:var(--bg2); border:1px solid var(--border); color:var(--ink);
      padding:4px 10px; border-radius:5px;
    }
    .skill-tag-no {
      font-size:11px; font-family:var(--font-mono); font-weight:500;
      background:var(--bg); border:1px dashed var(--border2); color:var(--ink3);
      padding:4px 10px; border-radius:5px;
    }

    /* ── Radar chart ── */
    .radar-section {
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--radius); padding:24px 28px; margin-bottom:20px;
      box-shadow:var(--shadow); animation:rise .4s ease both;
    }
    .radar-section h3 { font-size:13px; font-weight:600; margin-bottom:16px; }

    /* ── Country comparison ── */
    .country-compare { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:20px; }
    .country-cmp-card {
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--radius); padding:20px 22px; box-shadow:var(--shadow);
    }
    .ccc-title { font-size:12px; font-weight:600; margin-bottom:12px; }

    @media(max-width:800px){
      .compare-header,.cmp-row{grid-template-columns:1fr;}
      .ch-label,.cmp-label{display:none;}
      .skill-compare-grid,.country-compare{grid-template-columns:1fr;}
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-brand">
      <div class="nav-mark">
        <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      </div>
      <span class="nav-name">Job Market Dataset</span>
    </a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="info.html">Information</a>
      <a href="compare.html" class="active">Compare</a>
    </div>
  </div>
</nav>

<!-- HERO + SELECTORS -->
<div class="compare-hero">
  <div class="compare-hero-inner">
    <h1>Compare Roles</h1>
    <p>เปรียบเทียบสองตำแหน่งงานแบบ side-by-side — เงินเดือน ทักษะ ประเทศ และอีกมาก</p>
    <div class="selector-row">
      <div class="selector-group">
        <label>Role A</label>
        <select class="role-select" id="selectA"></select>
      </div>
      <div class="compare-vs">vs</div>
      <div class="selector-group">
        <label>Role B</label>
        <select class="role-select" id="selectB"></select>
      </div>
      <button class="btn-compare" id="doCompare">Compare</button>
    </div>
  </div>
</div>

<!-- RESULTS -->
<div class="compare-page" id="compareResults">
  <div class="compare-placeholder" id="placeholder">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="3" y="3" width="7" height="18" rx="1"/><rect x="14" y="3" width="7" height="18" rx="1"/><line x1="10" y1="8" x2="14" y2="8"/><line x1="10" y1="12" x2="14" y2="12"/></svg>
    <p>Select two roles and click Compare</p>
    <small>เลือก 2 ตำแหน่งด้านบน แล้วกดปุ่ม Compare</small>
  </div>
</div>

<footer class="footer">
  AI & Data Science Job Market Dataset &mdash; for educational use
</footer>

<!-- SCROLL TO TOP -->
<button class="scroll-top" id="scrollTop">
  <svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg>
</button>

<script>
let allData = [];
const url = 'data.json';
let radarChart = null;

fetch(url)
  .then(r=>{ if(!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
  .then(data=>{
    allData = data;
    const roles = [...new Set(data.map(x=>x.job_title))].sort();
    ['selectA','selectB'].forEach((id,i)=>{
      const sel = document.getElementById(id);
      roles.forEach(r=>{
        const opt = document.createElement('option');
        opt.value = r; opt.textContent = r;
        if((i===0&&r===roles[0])||(i===1&&r===roles[1])) opt.selected=true;
        sel.appendChild(opt);
      });
    });
  });

document.getElementById('doCompare').addEventListener('click', runCompare);

function avg(arr){ return arr.length ? Math.round(arr.reduce((a,b)=>a+b,0)/arr.length) : 0; }
function pct(count, total){ return total ? Math.round(count/total*100) : 0; }

function runCompare(){
  const roleA = document.getElementById('selectA').value;
  const roleB = document.getElementById('selectB').value;
  if(roleA === roleB){ alert('Please select two different roles'); return; }

  const dA = allData.filter(x=>x.job_title===roleA);
  const dB = allData.filter(x=>x.job_title===roleB);
  if(!dA.length||!dB.length) return;

  const salA = dA.map(x=>+x.salary||0).filter(v=>v>0);
  const salB = dB.map(x=>+x.salary||0).filter(v=>v>0);
  const avgSalA = avg(salA), avgSalB = avg(salB);
  const maxSalA = Math.max(...salA), maxSalB = Math.max(...salB);
  const minSalA = Math.min(...salA), minSalB = Math.min(...salB);
  const openA = dA.reduce((s,x)=>s+(+x.job_openings||0),0);
  const openB = dB.reduce((s,x)=>s+(+x.job_openings||0),0);
  const remA = pct(dA.filter(x=>x.remote_type==='Remote').length, dA.length);
  const remB = pct(dB.filter(x=>x.remote_type==='Remote').length, dB.length);
  const senA = pct(dA.filter(x=>x.experience_level==='Senior').length, dA.length);
  const senB = pct(dB.filter(x=>x.experience_level==='Senior').length, dB.length);
  const skMap = {Python:'skills_python',SQL:'skills_sql',ML:'skills_ml','Deep Learning':'skills_deep_learning',Cloud:'skills_cloud'};
  const skA = Object.entries(skMap).map(([n,k])=>({name:n,has:pct(dA.filter(x=>+x[k]===1).length,dA.length)}));
  const skB = Object.entries(skMap).map(([n,k])=>({name:n,has:pct(dB.filter(x=>+x[k]===1).length,dB.length)}));

  // top countries
  const ctryA = {}, ctryB = {};
  dA.forEach(x=>{ ctryA[x.country]=(ctryA[x.country]||0)+(+x.job_openings||0); });
  dB.forEach(x=>{ ctryB[x.country]=(ctryB[x.country]||0)+(+x.job_openings||0); });
  const topCtryA = Object.entries(ctryA).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const topCtryB = Object.entries(ctryB).sort((a,b)=>b[1]-a[1]).slice(0,5);

  const container = document.getElementById('compareResults');
  document.getElementById('placeholder').style.display='none';

  function winnerClass(a,b,higher=true){ return higher?(a>b?['winner','loser']:(a<b?['loser','winner']:['',''])):(a<b?['winner','loser']:(a>b?['loser','winner']:['',''])); }

  const [wSalA,wSalB] = winnerClass(avgSalA,avgSalB);
  const [wOpA,wOpB]   = winnerClass(openA,openB);
  const [wRemA,wRemB] = winnerClass(remA,remB);
  const [wSenA,wSenB] = winnerClass(senA,senB,false);

  function badge(cls){ return cls==='winner'?'<span class="winner-badge">Higher</span>':''; }
  function ctryBar(list){
    const maxV = list[0]?.[1]||1;
    return list.map(([c,v])=>`
      <div class="c-row">
        <div class="c-name">${c}</div>
        <div class="c-track"><div class="c-fill" style="width:${Math.round(v/maxV*100)}%"></div></div>
        <div class="c-num">${v}</div>
      </div>`).join('');
  }

  container.innerHTML = `
    <!-- Header -->
    <div class="compare-header">
      <div class="ch-label" style="font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--ink3)">Metric</div>
      <div class="ch-role role-a">
        <div class="ch-role-name">${roleA}</div>
        <div style="font-size:11px;color:var(--ink3)">${dA.length} records</div>
        <div class="ch-role-bar" style="background:#2563eb"></div>
      </div>
      <div class="ch-role role-b">
        <div class="ch-role-name">${roleB}</div>
        <div style="font-size:11px;color:var(--ink3)">${dB.length} records</div>
        <div class="ch-role-bar" style="background:#16a34a"></div>
      </div>
    </div>

    <!-- Rows -->
    <div class="compare-body">
      <div class="cmp-row">
        <div class="cmp-label">Avg Salary</div>
        <div class="cmp-val mono ${wSalA}">$${avgSalA.toLocaleString()} ${badge(wSalA)}</div>
        <div class="cmp-val mono ${wSalB}">$${avgSalB.toLocaleString()} ${badge(wSalB)}</div>
      </div>
      <div class="cmp-row">
        <div class="cmp-label">Max Salary</div>
        <div class="cmp-val mono">$${maxSalA.toLocaleString()}</div>
        <div class="cmp-val mono">$${maxSalB.toLocaleString()}</div>
      </div>
      <div class="cmp-row">
        <div class="cmp-label">Min Salary</div>
        <div class="cmp-val mono">$${minSalA.toLocaleString()}</div>
        <div class="cmp-val mono">$${minSalB.toLocaleString()}</div>
      </div>
      <div class="cmp-row">
        <div class="cmp-label">Job Openings</div>
        <div class="cmp-val mono ${wOpA}">${openA.toLocaleString()} ${badge(wOpA)}</div>
        <div class="cmp-val mono ${wOpB}">${openB.toLocaleString()} ${badge(wOpB)}</div>
      </div>
      <div class="cmp-row">
        <div class="cmp-label">Remote %</div>
        <div class="cmp-val ${wRemA}">${remA}% remote ${badge(wRemA)}</div>
        <div class="cmp-val ${wRemB}">${remB}% remote ${badge(wRemB)}</div>
      </div>
      <div class="cmp-row">
        <div class="cmp-label">Senior %</div>
        <div class="cmp-val ${wSenA}">${senA}% senior ${badge(wSenA)}</div>
        <div class="cmp-val ${wSenB}">${senB}% senior ${badge(wSenB)}</div>
      </div>
    </div>

    <!-- Radar chart -->
    <div class="radar-section">
      <h3>Skill & Attribute Profile</h3>
      <div style="max-width:460px;margin:0 auto">
        <canvas id="radarChart" height="300"></canvas>
      </div>
      <div style="display:flex;justify-content:center;gap:20px;margin-top:12px">
        <div style="display:flex;align-items:center;gap:6px;font-size:12px"><div style="width:12px;height:12px;border-radius:2px;background:#2563eb55;border:2px solid #2563eb"></div>${roleA.replace('Machine Learning','ML').replace('Engineer','Eng')}</div>
        <div style="display:flex;align-items:center;gap:6px;font-size:12px"><div style="width:12px;height:12px;border-radius:2px;background:#16a34a55;border:2px solid #16a34a"></div>${roleB.replace('Machine Learning','ML').replace('Engineer','Eng')}</div>
      </div>
    </div>

    <!-- Skills -->
    <div class="skill-compare-grid">
      <div class="skill-cmp-card">
        <div class="skill-cmp-title" style="color:#2563eb">${roleA} — Skills</div>
        <div class="skill-tag-wrap">
          ${skA.map(s=>`<span class="${s.has>50?'skill-tag-yes':'skill-tag-no'}">${s.name} ${s.has}%</span>`).join('')}
        </div>
      </div>
      <div class="skill-cmp-card">
        <div class="skill-cmp-title" style="color:#16a34a">${roleB} — Skills</div>
        <div class="skill-tag-wrap">
          ${skB.map(s=>`<span class="${s.has>50?'skill-tag-yes':'skill-tag-no'}">${s.name} ${s.has}%</span>`).join('')}
        </div>
      </div>
    </div>

    <!-- Countries -->
    <div class="country-compare">
      <div class="country-cmp-card">
        <div class="ccc-title" style="color:#2563eb">${roleA} — Top Countries</div>
        ${ctryBar(topCtryA)}
      </div>
      <div class="country-cmp-card">
        <div class="ccc-title" style="color:#16a34a">${roleB} — Top Countries</div>
        ${ctryBar(topCtryB)}
      </div>
    </div>
  `;

  // Radar chart
  const radarLabels = ['Avg Salary (norm)','Openings (norm)','Remote %','Python %','ML %','Cloud %','Deep Learning %'];
  const maxSalGlobal = Math.max(...allData.map(x=>+x.salary||0));
  const maxOpGlobal  = openA+openB||1;
  function normalize(val,max){ return Math.round(val/max*100); }
  const radarA = [
    normalize(avgSalA,maxSalGlobal),
    normalize(openA,maxOpGlobal),
    remA,
    pct(dA.filter(x=>+x.skills_python===1).length,dA.length),
    pct(dA.filter(x=>+x.skills_ml===1).length,dA.length),
    pct(dA.filter(x=>+x.skills_cloud===1).length,dA.length),
    pct(dA.filter(x=>+x.skills_deep_learning===1).length,dA.length),
  ];
  const radarB = [
    normalize(avgSalB,maxSalGlobal),
    normalize(openB,maxOpGlobal),
    remB,
    pct(dB.filter(x=>+x.skills_python===1).length,dB.length),
    pct(dB.filter(x=>+x.skills_ml===1).length,dB.length),
    pct(dB.filter(x=>+x.skills_cloud===1).length,dB.length),
    pct(dB.filter(x=>+x.skills_deep_learning===1).length,dB.length),
  ];

  if(radarChart) radarChart.destroy();
  radarChart = new Chart('radarChart',{
    type:'radar',
    data:{
      labels:radarLabels,
      datasets:[
        {label:roleA,data:radarA,borderColor:'#2563eb',backgroundColor:'#2563eb22',borderWidth:2,pointBackgroundColor:'#2563eb',pointRadius:4},
        {label:roleB,data:radarB,borderColor:'#16a34a',backgroundColor:'#16a34a22',borderWidth:2,pointBackgroundColor:'#16a34a',pointRadius:4},
      ]
    },
    options:{
      plugins:{legend:{display:false}},
      scales:{r:{
        beginAtZero:true,max:100,
        grid:{color:'#e0ddd6'},
        ticks:{backdropColor:'transparent',font:{size:9},color:'#9e9b93'},
        pointLabels:{font:{size:10},color:'#5a5750'}
      }}
    }
  });

  window.scrollTo({top:200,behavior:'smooth'});
}

// Scroll to top
const stBtn=document.getElementById('scrollTop');
window.addEventListener('scroll',()=>stBtn.classList.toggle('visible',window.scrollY>400),{passive:true});
stBtn.addEventListener('click',()=>window.scrollTo({top:0,behavior:'smooth'}));
</script>
</body>
</html>
