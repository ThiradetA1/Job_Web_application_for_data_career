<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Description Details</title>
    <style>
        /* แต่ง CSS ให้ดูเป็นหน้า Job Detail สวยๆ อ่านง่าย */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; padding: 20px; color: #333; }
        .job-container { max-width: 800px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { margin-top: 0; color: #111; }
        .tag-group { margin-bottom: 20px; }
        .tag { background: #ff6b6b; color: white; padding: 5px 12px; border-radius: 20px; font-size: 14px; margin-right: 5px; display: inline-block; margin-bottom: 5px;}
        .tag.industry { background: #ff6b6b; } /* สีแดงแบบในรูป */
        .tag.remote { background: #20c997; }   /* สีเขียวแบบในรูป */
        .tag.urgency { background: #fca311; }  /* สีส้ม */
        
        .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px;}
        .detail-item strong { color: #555; }
        
        .skills-section { margin-top: 25px; padding-top: 20px; border-top: 1px solid #eee; }
        .skill-tag { background: #e9ecef; color: #333; padding: 5px 10px; border-radius: 5px; font-size: 14px; margin-right: 5px; border: 1px solid #ccc;}
        
        .back-btn { display: inline-block; margin-top: 30px; text-decoration: none; color: #007bff; font-weight: bold; }
        .back-btn:hover { text-decoration: underline; }
            .apply-btn {
    background-color: #90d8d8; /* สีฟ้าอ่อนคล้ายๆ หน้าแรกของคุณ */
    color: #333;
    padding: 12px 25px;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    margin-right: 15px;
    margin-top: 30px;
    transition: background-color 0.3s;
}

.apply-btn:hover {
    background-color: #76c0c0; /* สีเข้มขึ้นนิดนึงตอนเอาเมาส์ชี้ */
}

/* จัดกลุ่มปุ่มให้อยู่ด้วยกัน */
.action-buttons {
    display: flex;
    align-items: center;
    margin-top: 10px;}
    
    </style>
</head>
<body>

    <div class="job-container">
        <h1 id="job-title">กำลังโหลดข้อมูล...</h1>
        
        <div class="tag-group">
            <span id="job-industry" class="tag industry"></span>
            <span id="job-remote" class="tag remote"></span>
            <span id="job-urgency" class="tag urgency"></span>
        </div>

        <div class="detail-grid">
            <div class="detail-item"><strong>Company Size:</strong> <span id="company-size">-</span></div>
            <div class="detail-item"><strong>Country:</strong> <span id="country">-</span></div>
            <div class="detail-item"><strong>Experience Level:</strong> <span id="exp-level">-</span></div>
            <div class="detail-item"><strong>Years of Experience:</strong> <span id="years-exp">-</span></div>
            <div class="detail-item"><strong>Education Level:</strong> <span id="edu-level">-</span></div>
            <div class="detail-item"><strong>Salary:</strong> $<span id="salary">-</span></div>
            <div class="detail-item"><strong>Job Openings:</strong> <span id="openings">-</span> positions</div>
            <div class="detail-item"><strong>Posted Date:</strong> <span id="posted-date">-</span></div>
        </div>

        <div class="skills-section">
            <h3>Required Skills:</h3>
            <div id="skills-container">
                </div>
        </div>
        
        <div class="action-buttons">
            <button class="apply-btn" onclick="alert('ระบบสมัครงานกำลังอยู่ในช่วงพัฒนาจ้า 🚀')">Apply Now</button>
            <a href="index.html" class="back-btn">⬅ กลับไปหน้าแรก</a>
        </div>
        
    </div> 

    </div>


    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const jobId = urlParams.get('id');
        const url = 'data.json'; // ⚠️ ตรวจสอบชื่อไฟล์ JSON ให้ตรงกับของคุณ

        if (jobId) {
            fetch(url)
                .then(response => {
                    if (!response.ok) throw new Error("ไม่พบไฟล์ JSON");
                    return response.json();
                })
                .then(data => {
                    // ค้นหาข้อมูลตาม job_id
                    const jobDetail = data.find(item => String(item.job_id) === jobId);

                    if (jobDetail) {
                        // 1. ใส่ข้อมูลส่วนหัว
                        document.getElementById('job-title').innerText = jobDetail.job_title;
                        document.getElementById('job-industry').innerText = jobDetail.company_industry;
                        document.getElementById('job-remote').innerText = jobDetail.remote_type;
                        document.getElementById('job-urgency').innerText = `Urgency: ${jobDetail.hiring_urgency}`;

                        // 2. ใส่ข้อมูลรายละเอียดต่างๆ
                        document.getElementById('company-size').innerText = jobDetail.company_size;
                        document.getElementById('country').innerText = jobDetail.country;
                        document.getElementById('exp-level').innerText = jobDetail.experience_level;
                        document.getElementById('years-exp').innerText = jobDetail.years_experience;
                        document.getElementById('edu-level').innerText = jobDetail.education_level;
                        document.getElementById('salary').innerText = jobDetail.salary.toLocaleString(); // ใส่ลูกน้ำให้ตัวเลขเงินเดือน
                        document.getElementById('openings').innerText = jobDetail.job_openings;
                        document.getElementById('posted-date').innerText = `${jobDetail.job_posting_month}/${jobDetail.job_posting_year}`;

                        // 3. จัดการแสดงผล Skills (เช็คว่าถ้าเป็น 1 ถึงจะแสดง)
                        const skillsContainer = document.getElementById('skills-container');
                        let skillsHTML = '';
                        
                        if (jobDetail.skills_python === 1) skillsHTML += '<span class="skill-tag">Python</span>';
                        if (jobDetail.skills_sql === 1) skillsHTML += '<span class="skill-tag">SQL</span>';
                        if (jobDetail.skills_ml === 1) skillsHTML += '<span class="skill-tag">Machine Learning</span>';
                        if (jobDetail.skills_deep_learning === 1) skillsHTML += '<span class="skill-tag">Deep Learning</span>';
                        if (jobDetail.skills_cloud === 1) skillsHTML += '<span class="skill-tag">Cloud Computing</span>';

                        // ถ้าไม่มี skill อะไรเลยให้ขึ้นข้อความบอก
                        if (skillsHTML === '') {
                            skillsHTML = '<span>ไม่ระบุทักษะเฉพาะเจาะจง</span>';
                        }
                        
                        skillsContainer.innerHTML = skillsHTML;

                    } else {
                        document.getElementById('job-title').innerText = "ไม่พบข้อมูลงานนี้ในระบบ";
                    }
                })
                .catch(error => {
                    console.error("เกิดข้อผิดพลาด:", error);
                    document.getElementById('job-title').innerText = "โหลดข้อมูลไม่สำเร็จ กรุณาลองใหม่";
                });
        } else {
            document.getElementById('job-title').innerText = "ไม่พบรหัสงาน (ID)";
        }
    </script>
</body>
</html>
